<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Irene Li, PhD | Portfolio</title>
  <meta name="description" content="A simple portfolio homepage with CV and contact information." />

  <style>
    :root {
      --bg: #f7f7f4;
      --text: #111111;
      --muted: #666666;
      --border: #dddddd;
      --accent: #111111;
      --card: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 48px 20px;
    }

    .hero {
      width: 100%;
      max-width: 920px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 56px;
      align-items: center;
    }

    .photo-wrap {
      width: 280px;
      height: 360px;
      border-radius: 24px;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.06);
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .content {
      max-width: 560px;
    }

    .eyebrow {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 72px);
      line-height: 0.95;
      letter-spacing: -0.06em;
      font-weight: 700;
    }

    .intro {
      margin: 24px 0 32px;
      max-width: 480px;
      color: var(--muted);
      font-size: 18px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      transition: transform 160ms ease, opacity 160ms ease;
    }

    .button.secondary {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
    }

    .button:hover {
      transform: translateY(-1px);
      opacity: 0.88;
    }

    footer {
      padding: 24px 20px;
      border-top: 1px solid var(--border);
    }

    .footer-inner {
      max-width: 920px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-links a:hover {
      color: var(--text);
    }

    @media (max-width: 760px) {
      main {
        place-items: start;
        padding-top: 32px;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .photo-wrap {
        width: 100%;
        max-width: 360px;
        height: 420px;
      }

      .footer-inner {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <main>
      <section class="hero" aria-labelledby="intro-title">
        <div class="photo-wrap">
          <img src="photo.jpg" alt="Portrait of Your Name" />
        </div>

        <div class="content">
          <p class="eyebrow">Portfolio</p>
          <h1 id="intro-title">Your Name</h1>
          <p class="intro">
            Spatial biologist and artist in motion.
          </p>

          <div class="actions">
            <a class="button" href="cv.pdf" target="_blank" rel="noopener">View CV</a>
            <a class="button secondary" href="mailto:hello@ireneli.xyz">Contact</a>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-inner">
        <span>© 2026 Your Name</span>
        <nav class="footer-links" aria-label="Contact links">
          <a href="mailto:hello@ireneli.xyz">hello@ireneli.xyz</a>
          <a href="https://www.linkedin.com/in/liirene1" target="_blank" rel="noopener">LinkedIn</a>
          <a href="https://github.com/liirene" target="_blank" rel="noopener">GitHub</a>
        </nav>
      </div>
    </footer>
  </div>
</body>
</html>
